<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D体素生成器 (可控壳厚度版)</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/",
                "three/addons/exporters/": "https://unpkg.com/three@0.150.0/examples/jsm/exporters/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <div class="ui-header">
            <h3>🛠️ 3D 生成控制台</h3>
            <button id="ui-toggle" class="ui-toggle" type="button" aria-expanded="true" aria-controls="ui-panel-body">收起</button>
        </div>

        <div id="ui-panel-body">
            <div class="input-group">
                <label class="highlight-label">图片1: 正面视图 (Front)</label>
                <input type="file" id="fileFront" accept="image/*">
            </div>
            <div class="input-group">
                <label class="highlight-label">图片2: 侧面视图 (Side)</label>
                <input type="file" id="fileSide" accept="image/*">
            </div>

            <div class="advanced-panel">
                <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false" aria-controls="advanced-body">
                    显示高级选项
                </button>

                <div id="advanced-body" class="advanced-body" hidden>
                    <div class="input-group filter-panel">
                        <label>过滤规则 (保留物体区域)</label>
                        <div class="filter-alpha-row">
                            <input type="checkbox" id="filter-alpha" checked>
                            <label for="filter-alpha" class="filter-alpha-label">忽略透明像素 (PNG)</label>
                        </div>
                        <div class="filter-grid">
                            <input type="checkbox" id="use-r" checked><span class="channel-label channel-r">R</span>
                            <select id="op-r"><option value="<">&lt;</option><option value=">">&gt;</option></select><input type="number" id="val-r" value="250">

                            <input type="checkbox" id="use-g" checked><span class="channel-label channel-g">G</span>
                            <select id="op-g"><option value="<">&lt;</option><option value=">">&gt;</option></select><input type="number" id="val-g" value="250">

                            <input type="checkbox" id="use-b" checked><span class="channel-label channel-b">B</span>
                            <select id="op-b"><option value="<">&lt;</option><option value=">">&gt;</option></select><input type="number" id="val-b" value="250">
                        </div>
                    </div>

                    <div class="input-group checkbox-wrapper">
                        <div>
                            <label for="enable-culling">启用内部剔除</label>
                        </div>
                        <input type="checkbox" id="enable-culling" checked>
                    </div>

                    <div class="input-group">
                        <label>保留壳厚度 (层数)</label>
                        <input type="number" id="shell-thickness" min="1" max="10" value="2">
                        <div class="hint">1层 = 仅表面; 2-5层 = 加厚外壳。<br>数值越大，生成的内部点越多。</div>
                    </div>

                    <div class="input-group">
                        <label>分辨率高度 (px)</label>
                        <input type="number" id="resolution" min="10" max="600" value="150" step="1">
                    </div>
                </div>
            </div>

            <button id="btn-generate">生成模型</button>

            <div class="input-group preview-panel">
                <label class="preview-label">处理后的投影视图</label>
                <div class="preview-grid">
                    <div class="preview-card">
                        <span class="preview-card-title">Front</span>
                        <canvas id="preview-front" width="150" height="150"></canvas>
                    </div>
                    <div class="preview-card">
                        <span class="preview-card-title">Side</span>
                        <canvas id="preview-side" width="150" height="150"></canvas>
                    </div>
                </div>
                <div class="hint">这里显示裁剪、缩放和过滤后的结果，方便检查输入是否正确。</div>
            </div>

            <div class="input-group export-panel">
                <label class="export-label">📦 导出3D模型</label>
                <div class="export-group">
                    <button id="btn-export-stl" class="export-button" disabled>STL</button>
                    <button id="btn-export-obj" class="export-button" disabled>OBJ</button>
                    <button id="btn-export-gltf" class="export-button" disabled>GLTF</button>
                </div>
                <div class="hint">生成模型后可导出为3D打印或其他软件使用</div>
            </div>

            <div id="status" aria-live="polite"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
